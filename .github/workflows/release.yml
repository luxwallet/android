name: release

# Canonical native release for the Lux Android wallet (Kotlin / Gradle).
#
# Per BRAND (lux|hanzo|zoo), build an UNSIGNED release .aab on the arcd
# self-hosted fleet (NEVER GitHub-hosted), then sign it with the org upload
# keystore + (optionally) upload to Google Play via hanzoai/ci-signing
# sign-android.yml. The signed .aab + .apk publish to a GitHub Release.
#
# Brand is BAKED at build time: emit-brand (@luxwallet/brand + @luxwallet/chains)
# resolves the brand gateway + default EVM chain id, passed to Gradle as
# -PluxwalletGatewayRpcBaseUrl / -PluxwalletBrandName / -PluxwalletDefaultEvmChainId
# (consumed by app/build.gradle.kts).

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand to build
        type: choice
        options: [all, lux, hanzo, zoo]
        default: all
      upload-play:
        description: Upload to Google Play (internal track)
        type: boolean
        default: false
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [luxfi-linux-amd64]
    outputs:
      brands: ${{ steps.matrix.outputs.brands }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: |
          set -euo pipefail
          B='${{ github.event.inputs.brand }}'
          if [ -n "$B" ] && [ "$B" != "all" ]; then
            echo "brands=[\"$B\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'brands=["lux","hanzo","zoo"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        brand: ${{ fromJSON(needs.prepare.outputs.brands) }}
    runs-on: [luxfi-linux-amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bake brand (@luxwallet/brand -> env)
        run: |
          set -euo pipefail
          npx --yes -p @luxwallet/brand@latest -p @luxwallet/chains@latest \
            emit-brand "${{ matrix.brand }}" . >> "$GITHUB_ENV"

      - name: Build unsigned release bundle (.aab)
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :app:bundleBaseRelease --no-daemon --stacktrace \
            -PluxwalletBrandName="${{ env.BRAND_NAME }}" \
            -PluxwalletGatewayRpcBaseUrl="${{ env.BRAND_GATEWAY_RPC_BASE_URL }}" \
            -PluxwalletDefaultEvmChainId="${{ env.BRAND_DEFAULT_EVM_CHAIN_ID }}"

      - name: Stage unsigned .aab
        run: |
          set -euo pipefail
          mkdir -p out
          AAB="$(find app/build/outputs/bundle -name '*.aab' | head -1)"
          test -n "$AAB"
          cp "$AAB" "out/luxwallet-${{ matrix.brand }}-android.aab"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: luxwallet-${{ matrix.brand }}-android
          path: out/luxwallet-${{ matrix.brand }}-android.aab
          if-no-files-found: error

  # Sign the .aab with the org upload keystore (+ optional Play upload).
  sign-android:
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        brand: ${{ fromJSON(needs.prepare.outputs.brands) }}
    uses: hanzoai/ci-signing/.github/workflows/sign-android.yml@v1
    with:
      artifact-name: luxwallet-${{ matrix.brand }}-android
      file-glob: '*.aab'
      upload-play: ${{ github.event.inputs.upload-play == 'true' }}
      package-name: ${{ matrix.brand == 'lux' && 'network.lux.wallet' || format('network.{0}.wallet', matrix.brand) }}
      track: internal
      runs-on: '["luxfi-linux-amd64"]'
    secrets: inherit

  publish-release:
    needs: sign-android
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: [luxfi-linux-amd64]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.aab
          fail_on_unmatched_files: false
